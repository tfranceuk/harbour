name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: "Test: unit tests"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run vet
        run: make vet

      - name: Run tests
        run: make test

  provision:
    name: "Test: provision on macOS Intel (${{ matrix.agent }})"
    # GitHub-hosted Apple Silicon runners exist, but hosted Colima coverage is
    # not reliable there yet because nested virtualisation support is still a blocker.
    # Add Apple Silicon macOS coverage when that runner path is viable.
    runs-on: macos-15-intel
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        agent:
          - claude
          - codex

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Colima dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install colima docker qemu

      - name: Build Harbour
        run: |
          mkdir -p bin
          go build -o bin/harbour ./cmd/harbour

      - name: Set up harness template
        run: |
          workspace_path="${RUNNER_TEMP}/workspace"
          harness_path="${workspace_path}/harbour-harness"
          harness_ref="6d0d5625c120367e4051ee6d398830130040a54d"
          git clone https://github.com/agent-harbour/harbour-harness-template.git "${harness_path}"
          git -C "${harness_path}" checkout "${harness_ref}"
          mkdir -p "${workspace_path}/your-org/frontend"
          mkdir -p "${workspace_path}/your-org/backend"
          mkdir -p "${workspace_path}/your-org/lambdas"

      - name: Seed CI Colima settings
        run: |
          config_dir="${HOME}/Library/Application Support/harbour"
          mkdir -p "${config_dir}"
          cat > "${config_dir}/config.json" <<'EOF'
          {
            "vm_backend": "colima",
            "vm_profile": "harbour",
            "vm_runtime": "docker",
            "vm_type": "qemu",
            "vm_arch": "x86_64",
            "vm_cpu": 2,
            "vm_memory": 4,
            "vm_disk": 20,
            "vm_mount_type": "sshfs",
            "vm_forward_ssh_agent": false,
            "vm_network_address": false,
            "codex_version": "latest",
            "claude_code_version": "latest",
            "harness_path": "",
            "workspace_path": "",
            "active_agent": "",
            "default_command": "agent"
          }
          EOF

      - name: Run harbour provision
        run: |
          workspace_path="${RUNNER_TEMP}/workspace"
          harness_path="${workspace_path}/harbour-harness"
          {
            printf '%s\n' "${workspace_path}"
            printf '%s\n' "${harness_path}"
            printf '%s\n' "${{ matrix.agent }}"
            printf '\n'
          } | ./bin/harbour provision

      - name: Verify provisioned agent
        run: |
          workspace_path="${RUNNER_TEMP}/workspace"
          config_path="${HOME}/Library/Application Support/harbour/config.json"
          colima status -p harbour
          grep -F "\"active_agent\": \"${{ matrix.agent }}\"" "${config_path}"
          colima ssh -p harbour -- /usr/bin/env bash -lc "ls -la \"${workspace_path}\""
          case "${{ matrix.agent }}" in
            codex)
              colima ssh -p harbour -- /usr/bin/env bash -lc 'test -L "${HOME}/.codex/AGENTS.md"'
              colima ssh -p harbour -- /usr/bin/env bash -lc 'command -v codex'
              ;;
            claude)
              colima ssh -p harbour -- /usr/bin/env bash -lc 'test -L "${HOME}/.claude/CLAUDE.md"'
              colima ssh -p harbour -- /usr/bin/env bash -lc 'export PATH="${HOME}/.local/bin:${PATH}"; command -v claude'
              ;;
          esac

      - name: Clean up Colima profile
        if: always()
        run: |
          colima stop -p harbour || true
          colima delete -f -p harbour || true
