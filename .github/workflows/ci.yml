name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: "Test: unit tests"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

  provision:
    name: "Test: provision on macOS Intel (${{ matrix.agent }})"
    # GitHub-hosted Apple Silicon runners exist, but hosted Colima coverage is
    # not reliable there yet because nested virtualisation support is still a blocker.
    # Add Apple Silicon macOS coverage when that runner path is viable.
    runs-on: macos-15-intel
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        agent:
          - claude
          - codex

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Colima dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install colima docker qemu

      - name: Build Harbour
        run: |
          mkdir -p bin
          go build -o bin/harbour ./cmd/harbour

      - name: Set up harness template
        run: |
          harness_path="${RUNNER_TEMP}/harbour-harness"
          harness_ref="265cd943503346368d1e99a047f27520f43c8009"
          git clone https://github.com/agent-harbour/harbour-harness-template.git "${harness_path}"
          git -C "${harness_path}" checkout "${harness_ref}"
          cat > "${harness_path}/repos.yaml" <<'EOF'
          repos:
            - host_path: harbour
          EOF

      - name: Run harbour provision
        run: |
          harness_path="${RUNNER_TEMP}/harbour-harness"
          workspace_root="$(dirname "$GITHUB_WORKSPACE")"
          {
            printf '%s\n' "${harness_path}"
            printf '%s\n' "${workspace_root}"
            printf '%s\n' "${{ matrix.agent }}"
            printf '\n'
          } | ./bin/harbour provision

      - name: Verify provisioned agent
        run: |
          workspace_root="$(dirname "$GITHUB_WORKSPACE")"
          repo_root="${GITHUB_WORKSPACE}"
          config_path="${HOME}/Library/Application Support/harbour/config.json"
          colima status -p harbour
          grep -F "\"active_agent\": \"${{ matrix.agent }}\"" "${config_path}"
          ls -la "${workspace_root}"
          ls -la "${repo_root}"
          case "${{ matrix.agent }}" in
            codex)
              test -L "${workspace_root}/AGENTS.md" || test -L "${repo_root}/AGENTS.md"
              colima ssh -p harbour -- /usr/bin/env bash -lc 'command -v codex'
              ;;
            claude)
              test -L "${workspace_root}/CLAUDE.md" || test -L "${repo_root}/CLAUDE.md"
              colima ssh -p harbour -- /usr/bin/env bash -lc 'command -v claude'
              ;;
          esac

      - name: Clean up Colima profile
        if: always()
        run: |
          colima stop -p harbour || true
          colima delete -f -p harbour || true
